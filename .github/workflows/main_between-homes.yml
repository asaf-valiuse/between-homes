name: Build and deploy Python app to Azure Web App - between-homes

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python version
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Create virtual environment and validate app
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
          python -m py_compile server.py

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_12F71DE8FA994DC2900C2E44622FEA67 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2BF93B22A5364412B933990938364DA6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_739350765BC3453290EAE72D3B30D7BA }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: between-homes
          slot-name: Production
          startup-command: 'python server.py --host 0.0.0.0 --port ${PORT:-8000}'
